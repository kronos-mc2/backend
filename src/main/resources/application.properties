spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gik}
spring.datasource.username=${DB_USERNAME:gik}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100

spring.jackson.default-property-inclusion=non_null

auth.jwt.secret=${AUTH_JWT_SECRET}
auth.jwt.expiration-seconds=${AUTH_JWT_EXPIRATION_SECONDS:2592000}
auth.google.client-ids=${AUTH_GOOGLE_CLIENT_IDS:}
auth.apple.client-id=${AUTH_APPLE_CLIENT_ID:}

app.payments.provider=stripe
app.payments.stub-enabled=${PAYMENTS_STUB_ENABLED:true}
app.payments.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}

app.notifications.push.enabled=${APP_NOTIFICATIONS_PUSH_ENABLED:true}
app.notifications.expo.endpoint=${APP_NOTIFICATIONS_EXPO_ENDPOINT:https://exp.host/--/api/v2/push/send}

app.messages.encryption.secret=${MESSAGES_ENCRYPTION_SECRET:${AUTH_JWT_SECRET}}

app.location-search.nominatim.base-url=${LOCATION_SEARCH_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
app.location-search.user-agent=${LOCATION_SEARCH_USER_AGENT:GdjeIKadaBackend/1.0}

app.storage.provider=${APP_STORAGE_PROVIDER:s3}
app.storage.endpoint=${APP_STORAGE_ENDPOINT:}
app.storage.region=${APP_STORAGE_REGION:auto}
app.storage.bucket=${APP_STORAGE_BUCKET:gik-event-media}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:}
app.storage.access-key=${APP_STORAGE_ACCESS_KEY:}
app.storage.secret-key=${APP_STORAGE_SECRET_KEY:}
app.storage.path-style-access=${APP_STORAGE_PATH_STYLE_ACCESS:true}
app.storage.max-total-bytes=${APP_STORAGE_MAX_TOTAL_BYTES:10737418240}
app.storage.max-file-bytes=${APP_STORAGE_MAX_FILE_BYTES:5242880}
app.storage.min-image-width=${APP_STORAGE_MIN_IMAGE_WIDTH:640}
app.storage.min-image-height=${APP_STORAGE_MIN_IMAGE_HEIGHT:640}
app.storage.max-image-width=${APP_STORAGE_MAX_IMAGE_WIDTH:8000}
app.storage.max-image-height=${APP_STORAGE_MAX_IMAGE_HEIGHT:8000}

spring.servlet.multipart.max-file-size=${APP_STORAGE_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${APP_STORAGE_MAX_REQUEST_SIZE:26MB}
