# Raspberry Pi / staging-like test deployment profile.
server.forward-headers-strategy=framework

logging.level.root=INFO
logging.level.hr.kronos.backend=INFO
logging.level.hr.kronos.backend.config.DevHttpRequestLoggingFilter=OFF

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/gik_test}
spring.datasource.username=${DB_USERNAME:gik}
spring.datasource.password=${DB_PASSWORD}

auth.jwt.secret=${AUTH_JWT_SECRET}
