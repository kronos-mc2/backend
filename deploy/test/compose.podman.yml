name: gik-test

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: gik_postgres_test
    restart: unless-stopped
    env_file:
      - ./backend.env
    volumes:
      - postgres-data:/var/lib/postgresql/data:Z
    networks:
      - gik-test

  minio:
    image: docker.io/minio/minio:latest
    container_name: gik_minio_test
    restart: unless-stopped
    env_file:
      - ./backend.env
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data:Z
    expose:
      - "9000"
      - "9001"
    networks:
      - gik-test
      - web

  minio-init:
    image: docker.io/minio/mc:latest
    container_name: gik_minio_init_test
    env_file:
      - ./backend.env
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$APP_STORAGE_BUCKET &&
      mc anonymous set none local/$$APP_STORAGE_BUCKET
      "
    networks:
      - gik-test

  backend:
    dns:
      - 192.168.31.229 #ovdje ide DNS ako ima adguard, ako ne onda moze bez dns
    container_name: gik_backend_test
    build:
      context: ../..
      dockerfile: Containerfile
    image: localhost/gik-backend:test
    restart: unless-stopped
    env_file:
      - ./backend.env
    environment:
      SPRING_PROFILES_ACTIVE: test
      SERVER_PORT: 8080
    depends_on:
      - postgres
      - minio
    expose:
      - "8080"
    networks:
      - gik-test
      - web

volumes:
  postgres-data:
  minio-data:

networks:
  gik-test:
  web:
    external: true
