name: gik-test

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: gik_postgres_test
    restart: unless-stopped
    env_file:
      - ./backend.env
    volumes:
      - postgres-data:/var/lib/postgresql/data:Z
    networks:
      - gik-test

  backend:
    dns:
      - 192.168.31.229 #ovdje ide DNS ako ima adguard, ako ne onda moze bez dns
    container_name: gik_backend_test
    build:
      context: ../..
      dockerfile: Containerfile
    image: localhost/gik-backend:test
    restart: unless-stopped
    env_file:
      - ./backend.env
    environment:
      SPRING_PROFILES_ACTIVE: test
      SERVER_PORT: 8080
    depends_on:
      - postgres
    expose:
      - "8080"
    networks:
      - gik-test
      - web

volumes:
  postgres-data:

networks:
  gik-test:
  web:
    external: true
